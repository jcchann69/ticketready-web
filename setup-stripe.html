<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#101625" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="TicketReady" />
    <title>TicketReady Stripe Setup</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" type="image/svg+xml" href="assets/app-icon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="assets/app-icon-180.png" />
    <link rel="stylesheet" href="styles.css" />
    <script src="pwa.js" defer></script>
    <style>
      body {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 20px;
      }

      .setup-shell {
        width: min(720px, 100%);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: #ffffff;
        box-shadow: var(--shadow);
        padding: 22px;
      }

      .setup-form {
        display: grid;
        gap: 14px;
      }

      .setup-form p {
        color: var(--muted);
        line-height: 1.5;
      }

      .setup-form code {
        color: var(--teal-dark);
        font-weight: 800;
      }

      .setup-status {
        min-height: 24px;
      }
    </style>
  </head>
  <body>
    <main class="setup-shell">
      <form class="setup-form" id="stripeSetupForm">
        <div>
          <p class="eyebrow">Local Only</p>
          <h1>Stripe Test Setup</h1>
          <p>
            Enter your Stripe <strong>test</strong> keys here. They will be saved only to this project's local
            <code>.env</code> file. Do not use live keys yet.
          </p>
        </div>

        <div class="field-pair">
          <label for="publishableKey">Publishable key</label>
          <input id="publishableKey" name="publishableKey" autocomplete="off" placeholder="pk_test_..." />
        </div>

        <div class="field-pair">
          <label for="secretKey">Secret key</label>
          <input id="secretKey" name="secretKey" autocomplete="off" type="password" placeholder="sk_test_..." required />
        </div>

        <div class="field-pair">
          <label for="priceId">Price ID</label>
          <input id="priceId" name="priceId" autocomplete="off" placeholder="price_... or leave blank before setup:stripe" />
        </div>

        <div class="field-pair">
          <label for="webhookSecret">Webhook secret</label>
          <input id="webhookSecret" name="webhookSecret" autocomplete="off" type="password" placeholder="whsec_... optional" />
        </div>

        <button class="button button--primary" type="submit">Save Stripe Test Config</button>
        <button class="button button--secondary" id="createPriceBtn" type="button">Create TicketReady Pro Price</button>
        <p class="fine-print setup-status" id="setupStatus" aria-live="polite"></p>
        <a class="button button--secondary full-width" href="/">Back To App</a>
      </form>
    </main>

    <script>
      const form = document.querySelector("#stripeSetupForm");
      const status = document.querySelector("#setupStatus");
      const createPriceBtn = document.querySelector("#createPriceBtn");

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        status.textContent = "Saving local Stripe setup...";

        const body = Object.fromEntries(new FormData(form).entries());
        const response = await fetch("/api/local/configure-stripe", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
        });
        const payload = await response.json();

        if (!response.ok) {
          status.textContent = payload.error || "Could not save Stripe setup.";
          return;
        }

        status.textContent = payload.paymentsReady
          ? "Saved. Stripe Checkout is ready."
          : "Saved. Now create or enter a Stripe Price ID to enable checkout.";
      });

      createPriceBtn.addEventListener("click", async () => {
        status.textContent = "Creating TicketReady Pro product and monthly price in Stripe...";

        const response = await fetch("/api/local/create-stripe-price", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
        });
        const payload = await response.json();

        if (!response.ok) {
          status.textContent = payload.error || "Could not create Stripe price.";
          return;
        }

        document.querySelector("#priceId").value = payload.priceId;
        status.textContent = `Created Price ID ${payload.priceId}. Stripe Checkout is ready.`;
      });
    </script>
  </body>
</html>
