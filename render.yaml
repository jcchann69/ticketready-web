services:
  - type: web
    name: ticketready-web
    runtime: node
    plan: starter
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    disk:
      name: ticketready-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_VERSION
        value: 24.15.0
      - key: SITE_URL
        value: https://www.ticketready.net
      - key: DATABASE_PATH
        value: /var/data/ticketready.sqlite
      - key: SESSION_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
      - key: LOGIN_EMAIL_FROM
        value: "TicketReady <login@ticketready.net>"
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_PRICE_ID
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
